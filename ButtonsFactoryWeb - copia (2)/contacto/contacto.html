<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="contacto.css">
    <link href="https://fonts.googleapis.com/css2? familia=Montserrat:wght@400; 500; 600; 700&display=swap" rel="hoja de estilo">
</head>
<body>
    <div class="Contenido">

        <h2>Formulario de Contacto</h2>
        <form action="https://formsubmit.co/emprendisoft@gmail.com" method="POST">
            <label for="name">Nombre</label>
            <input type="text" name="name" id="name">
            <label for="email">Correo Electronico</label>
            <input type="email" name="email" id="email">
            <label for="subject">Asunto</label>
            <input type="text" name="subject" id="subject">
            <label for="coments">Comentarios</label>
            <textarea name="coments" id="coments" cols="30" rows="5"></textarea>        
            <input class="btn" type="submit" value="Enviar">
            <!--<input type="hidden" name="_next" value=""> -->
        </form>

    </div>
</body>
</html>
